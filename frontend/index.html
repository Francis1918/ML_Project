<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Chart</title>
  <link rel="stylesheet" href="styles.css?v=18" />
</head>
<body>
  <div id="app">

    <!-- Barra superior (toolbar) -->
    <div id="toolbar">
      <div class="tf-group">
        <button class="tf-btn active" data-tf="1m">1m</button>
        <button class="tf-btn" data-tf="5m">5m</button>
        <button class="tf-btn" data-tf="15m">15m</button>
        <button class="tf-btn" data-tf="1h">1h</button>
        <button class="tf-btn" data-tf="2h">2h</button>
        <button class="tf-btn" data-tf="4h">4h</button>
        <button class="tf-btn" data-tf="D">D</button>
        <button class="tf-btn" data-tf="W">W</button>
      </div>

      <!-- Dropdown multi-select de overlays. Solo filtra el render; no cambia calculos. -->
      <div id="overlay-controls" class="overlay-menu" aria-label="Indicadores y overlays">
        <button class="overlay-root" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="overlay-root-icon">◈</span>
          Indicadores y overlays
          <span class="overlay-root-caret">▾</span>
        </button>

        <div class="overlay-dropdown overlay-main-menu" role="menu" aria-label="Indicadores y overlays">
          <div class="overlay-submenu" role="none">
            <button class="overlay-menu-row overlay-parent-row" type="button" role="menuitem" aria-haspopup="true">
              <span>SMC</span>
              <span class="overlay-chevron">›</span>
            </button>

            <div class="overlay-submenu-panel" role="menu" aria-label="SMC overlays">
              <button class="overlay-menu-item layer-master" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_all">
                <span class="overlay-check">✓</span><span>Motor SMC</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_hh" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>HH</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_hl" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>HL</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_lh" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>LH</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_ll" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>LL</span>
              </button>
              <div class="overlay-menu-separator" role="separator"></div>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_choch" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>CHoCH</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_bos" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>BOS</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_fvg" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>FVG fade</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="smc_fib" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>Fibonacci auto</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="market_regime" data-layer-parent="smc_all">
                <span class="overlay-check">✓</span><span>Market Regime</span>
              </button>
            </div>
          </div>

          <div class="overlay-submenu" role="none">
            <button class="overlay-menu-row overlay-parent-row" type="button" role="menuitem" aria-haspopup="true">
              <span>Liquidez</span>
              <span class="overlay-chevron">›</span>
            </button>

            <div class="overlay-submenu-panel" role="menu" aria-label="Liquidity overlays">
              <button class="overlay-menu-item layer-master" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_all">
                <span class="overlay-check">✓</span><span>Módulo completo</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_bsl" data-layer-parent="liq_all">
                <span class="overlay-check">✓</span><span>BSL</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_ssl" data-layer-parent="liq_all">
                <span class="overlay-check">✓</span><span>SSL</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_eqh" data-layer-parent="liq_all">
                <span class="overlay-check">✓</span><span>EQH</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_eql" data-layer-parent="liq_all">
                <span class="overlay-check">✓</span><span>EQL</span>
              </button>
              <div class="overlay-menu-separator" role="separator"></div>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_grab" data-layer-parent="liq_all">
                <span class="overlay-check">✓</span><span>Liquidity Grab</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_sweep" data-layer-parent="liq_all">
                <span class="overlay-check">✓</span><span>Sweep</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_run" data-layer-parent="liq_all">
                <span class="overlay-check">✓</span><span>Run</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="liq_htf" data-layer-parent="liq_all">
                <span class="overlay-check">✓</span><span>Liquidez HTF</span>
              </button>
            </div>
          </div>

          <div class="overlay-submenu" role="none">
            <button class="overlay-menu-row overlay-parent-row" type="button" role="menuitem" aria-haspopup="true">
              <span>Estrategias</span>
              <span class="overlay-chevron">›</span>
            </button>

            <div class="overlay-submenu-panel" role="menu" aria-label="Strategy overlays">
              <button class="overlay-menu-item layer-master" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_all">
                <span class="overlay-check">✓</span><span>Strategy Builder</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_supertrend" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>SuperTrend</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_halftrend" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>HalfTrend</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_range" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>Range Filter</span>
              </button>
              <div class="overlay-menu-separator" role="separator"></div>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_supply" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>Supply Zones</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_demand" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>Demand Zones</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_ob" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>Order Blocks</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_sr" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>Support / Resistance</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_trendlines" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>Trendlines</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_channels" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>Channels</span>
              </button>
              <button class="overlay-menu-item" type="button" role="menuitemcheckbox" aria-checked="true" data-layer-toggle="strategy_daily" data-layer-parent="strategy_all">
                <span class="overlay-check">✓</span><span>Daily body/wick</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Controles de Replay -->
      <div id="replay-group">
        <button id="btn-replay-on" title="Activar modo Replay">&#x21A9; Replay</button>
        <div id="replay-controls" class="hidden">
          <button id="btn-rbk10" title="Retroceder 10 velas">&#xAB;</button>
          <button id="btn-rbk1"  title="Retroceder 1 vela">&#x2039;</button>
          <button id="btn-rplay" title="Play / Pausa">&#x25B6;</button>
          <button id="btn-rfwd1"  title="Avanzar 1 vela">&#x203A;</button>
          <button id="btn-rfwd10" title="Avanzar 10 velas">&#xBB;</button>
          <span id="replay-info"></span>
          <button id="btn-rexit" title="Salir del Replay">&#x2715;</button>
        </div>
      </div>

      <span class="spacer"></span>
      <div class="tool-group">
        <button id="btn-fib" class="tool-btn" title="Fibonacci manual">Fib</button>
        <button id="btn-fib-undo" class="tool-btn compact" title="Deshacer Fibonacci">Undo</button>
        <button id="btn-fib-clear" class="tool-btn compact" title="Borrar Fibonacci">Clear</button>
      </div>
      <div class="mode-group">
        <button id="btn-auto"   class="mode-btn active">Auto</button>
        <button id="btn-manual" class="mode-btn">Manual</button>
      </div>
      <button id="btn-reset">Reset</button>
      <button id="btn-help">?</button>
    </div>

    <!-- Panel de precios (velas) -->
    <div class="panel" id="price-panel">
      <canvas id="price-canvas"></canvas>
      <!-- Canvas superpuesto solo para crosshair (pointer-events:none) -->
      <canvas id="price-xhair" class="xhair-canvas"></canvas>
    </div>

    <!-- Panel del indicador ATR -->
    <div class="panel" id="atr-panel">
      <canvas id="atr-canvas"></canvas>
      <canvas id="atr-xhair" class="xhair-canvas"></canvas>
    </div>

    <!-- Barra de estado inferior -->
    <div id="statusbar">
      <span id="status-hover">Mueve el cursor sobre el grafico...</span>
      <span class="spacer"></span>
      <span id="status-window"></span>
    </div>

  </div>

  <script src="scales.js?v=16"></script>
  <script src="price_panel.js?v=16"></script>
  <script src="atr_panel.js?v=16"></script>
  <script src="chart_engine.js?v=21"></script>
  <script src="app.js?v=22"></script>
</body>
</html>
