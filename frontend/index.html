<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Chart</title>
  <link rel="stylesheet" href="styles.css?v=16" />
</head>
<body>
  <div id="app">

    <!-- Barra superior (toolbar) -->
    <div id="toolbar">
      <div class="tf-group">
        <button class="tf-btn active" data-tf="1m">1m</button>
        <button class="tf-btn" data-tf="5m">5m</button>
        <button class="tf-btn" data-tf="15m">15m</button>
        <button class="tf-btn" data-tf="1h">1h</button>
        <button class="tf-btn" data-tf="2h">2h</button>
        <button class="tf-btn" data-tf="4h">4h</button>
        <button class="tf-btn" data-tf="D">D</button>
        <button class="tf-btn" data-tf="W">W</button>
      </div>

      <!-- Checklist de capas visuales. Solo filtra el render; no cambia calculos. -->
      <div id="overlay-controls" class="overlay-controls" aria-label="Capas visuales">
        <span class="overlay-title">Capas</span>

        <label class="layer-check layer-master">
          <input type="checkbox" data-layer-toggle="smc_all" checked /> SMC
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="smc_hh" data-layer-parent="smc_all" checked /> HH
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="smc_hl" data-layer-parent="smc_all" checked /> HL
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="smc_lh" data-layer-parent="smc_all" checked /> LH
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="smc_ll" data-layer-parent="smc_all" checked /> LL
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="smc_choch" data-layer-parent="smc_all" checked /> CHoCH
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="smc_bos" data-layer-parent="smc_all" checked /> BOS
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="smc_fvg" data-layer-parent="smc_all" checked /> FVG
        </label>

        <span class="overlay-sep"></span>

        <label class="layer-check layer-master">
          <input type="checkbox" data-layer-toggle="liq_all" checked /> Liquidez
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="liq_bsl" data-layer-parent="liq_all" checked /> BSL
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="liq_ssl" data-layer-parent="liq_all" checked /> SSL
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="liq_eqh" data-layer-parent="liq_all" checked /> EQH
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="liq_eql" data-layer-parent="liq_all" checked /> EQL
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="liq_grab" data-layer-parent="liq_all" checked /> Grab
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="liq_sweep" data-layer-parent="liq_all" checked /> Sweep
        </label>
        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="liq_run" data-layer-parent="liq_all" checked /> Run
        </label>

        <span class="overlay-sep"></span>

        <label class="layer-check">
          <input type="checkbox" data-layer-toggle="market_regime" checked /> Regime
        </label>
      </div>

      <!-- Controles de Replay -->
      <div id="replay-group">
        <button id="btn-replay-on" title="Activar modo Replay">&#x21A9; Replay</button>
        <div id="replay-controls" class="hidden">
          <button id="btn-rbk10" title="Retroceder 10 velas">&#xAB;</button>
          <button id="btn-rbk1"  title="Retroceder 1 vela">&#x2039;</button>
          <button id="btn-rplay" title="Play / Pausa">&#x25B6;</button>
          <button id="btn-rfwd1"  title="Avanzar 1 vela">&#x203A;</button>
          <button id="btn-rfwd10" title="Avanzar 10 velas">&#xBB;</button>
          <span id="replay-info"></span>
          <button id="btn-rexit" title="Salir del Replay">&#x2715;</button>
        </div>
      </div>

      <span class="spacer"></span>
      <div class="mode-group">
        <button id="btn-auto"   class="mode-btn active">Auto</button>
        <button id="btn-manual" class="mode-btn">Manual</button>
      </div>
      <button id="btn-reset">Reset</button>
      <button id="btn-help">?</button>
    </div>

    <!-- Panel de precios (velas) -->
    <div class="panel" id="price-panel">
      <canvas id="price-canvas"></canvas>
      <!-- Canvas superpuesto solo para crosshair (pointer-events:none) -->
      <canvas id="price-xhair" class="xhair-canvas"></canvas>
    </div>

    <!-- Panel del indicador ATR -->
    <div class="panel" id="atr-panel">
      <canvas id="atr-canvas"></canvas>
      <canvas id="atr-xhair" class="xhair-canvas"></canvas>
    </div>

    <!-- Barra de estado inferior -->
    <div id="statusbar">
      <span id="status-hover">Mueve el cursor sobre el grafico...</span>
      <span class="spacer"></span>
      <span id="status-window"></span>
    </div>

  </div>

  <script src="scales.js?v=16"></script>
  <script src="price_panel.js?v=16"></script>
  <script src="atr_panel.js?v=16"></script>
  <script src="chart_engine.js?v=16"></script>
  <script src="app.js?v=16"></script>
</body>
</html>
